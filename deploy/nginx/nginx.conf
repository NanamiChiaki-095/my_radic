worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       E:/nginx/nginx-1.29.4/conf/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # 定义后端 Gateway 集群
    upstream gateway_cluster {
        # 轮询策略 (默认)
        server 127.0.0.1:8081; # Gateway 实例 1
        server 127.0.0.1:8082; # Gateway 实例 2
    }

    server {
        listen       8080; # Nginx 对外暴露的端口
        server_name  localhost;

        # 1. 静态资源 (index.html)
        # 你的项目根目录，请确保这里是正确的绝对路径
        # 注意 Windows 路径用斜杠 /，或者双反斜杠
        root E:/go_learn/my_radic; 
        
        location / {
            index  index.html;
            try_files $uri $uri/ /index.html;
        }

        # 2. 反向代理 API 接口 (HTTP)
        location /add_doc {
            proxy_pass http://gateway_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        location /article {
            proxy_pass http://gateway_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 3. 反向代理 WebSocket 搜索接口
        location /search {
            proxy_pass http://gateway_cluster;
            
            # WebSocket 必须的 Header
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
